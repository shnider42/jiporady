services:
  - type: web
    name: jiporady
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app_loader:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: JIPORADY_TOPIC
        value: cars

# Alternative:
# - key: JIPORADY_APP_MODULE
#   value: app_cars
